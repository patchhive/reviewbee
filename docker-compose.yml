services:
  backend:
    image: "${PATCHHIVE_REVIEW_BEE_BACKEND_IMAGE:-ghcr.io/patchhive/reviewbee-backend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./backend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    user: "${PATCHHIVE_BACKEND_UID:-0}:${PATCHHIVE_BACKEND_GID:-0}"
    ports:
      - "8040:8000"
    volumes:
      - ./data:/data
    environment:
      - REVIEW_BEE_DB_PATH=/data/review-bee.db
      - REVIEW_BEE_PORT=8000
      - RUST_LOG=info
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: "${PATCHHIVE_REVIEW_BEE_FRONTEND_IMAGE:-ghcr.io/patchhive/reviewbee-frontend}:${PATCHHIVE_IMAGE_TAG:-main}"
    build: ./frontend
    pull_policy: "${PATCHHIVE_IMAGE_PULL_POLICY:-missing}"
    ports:
      - "5177:8080"
    depends_on:
      - backend
    restart: unless-stopped
